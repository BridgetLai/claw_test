<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>Recall Timer</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-dim: #888;
      --accent: #00d4aa;
      --accent-hover: #00f5c4;
      --danger: #ff4757;
      --warning: #ffa502;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 480px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      color: var(--text-dim);
    }

    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* 遗忘曲线模式 */
    .curve-preview {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .curve-item {
      background: var(--bg);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
    }

    .curve-item.active {
      background: rgba(0, 212, 170, 0.15);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-danger:hover {
      background: #ff6b7a;
    }

    /* 自定义间隔模式 */
    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .input-wrapper {
      flex: 1;
    }

    .input-wrapper label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .input-wrapper input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* 闹钟列表 */
    .alarm-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .alarm-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: var(--bg);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .alarm-info {
      flex: 1;
    }

    .alarm-time {
      font-size: 14px;
      font-weight: 500;
    }

    .alarm-label {
      font-size: 11px;
      color: var(--text-dim);
    }

    .alarm-countdown {
      font-size: 12px;
      color: var(--warning);
      margin-right: 8px;
    }

    .btn-delete {
      padding: 6px 10px;
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }

    .btn-delete:hover {
      background: var(--danger);
      color: #fff;
    }

    .empty-state {
      text-align: center;
      padding: 24px;
      color: var(--text-dim);
      font-size: 13px;
    }

    /* 底部统计 */
    .stats {
      display: flex;
      justify-content: space-around;
      padding: 12px;
      background: var(--card);
      border-radius: 8px;
      margin-top: 16px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-dim);
    }

    /* 通知权限提示 */
    .permission-tip {
      background: rgba(255, 165, 2, 0.1);
      border: 1px solid var(--warning);
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      color: var(--warning);
      margin-bottom: 16px;
      cursor: pointer;
    }

    .permission-tip:hover {
      background: rgba(255, 165, 2, 0.2);
    }

    /* 滚动条 */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📚 Recall Timer</h1>
    <p>遗忘曲线复习提醒</p>
  </div>

  <!-- 通知权限提示 -->
  <div class="permission-tip" id="permissionTip" style="display:none" onclick="requestPermission()">
    ⚠️ 点击开启浏览器通知权限
  </div>

  <!-- 遗忘曲线模式 -->
  <div class="section">
    <div class="section-title">🎯 遗忘曲线模式</div>
    <div class="curve-preview">
      <div class="curve-item" data-min="5">5分钟</div>
      <div class="curve-item" data-min="30">30分钟</div>
      <div class="curve-item" data-min="720">12小时</div>
      <div class="curve-item" data-min="1440">1天</div>
      <div class="curve-item" data-min="4320">3天</div>
      <div class="curve-item" data-min="10080">7天</div>
      <div class="curve-item" data-min="21600">15天</div>
      <div class="curve-item" data-min="43200">30天</div>
    </div>
    <button class="btn btn-primary" onclick="setEbbinghausCurve()">
      🚀 一键设置遗忘曲线闹钟
    </button>
  </div>

  <!-- 自定义间隔模式 -->
  <div class="section">
    <div class="section-title">⏰ 自定义间隔模式</div>
    <div class="input-group">
      <div class="input-wrapper">
        <label>间隔（小时）</label>
        <input type="number" id="intervalHours" value="1" min="0.1" step="0.5">
      </div>
      <div class="input-wrapper">
        <label>闹钟个数</label>
        <input type="number" id="alarmCount" value="3" min="1" max="20">
      </div>
    </div>
    <button class="btn btn-primary" onclick="setCustomInterval()">
      ⚡ 设置自定义闹钟
    </button>
  </div>

  <!-- 闹钟列表 -->
  <div class="section">
    <div class="section-title">📋 待提醒列表</div>
    <div class="alarm-list" id="alarmList">
      <div class="empty-state">暂无闹钟，点击上方按钮添加</div>
    </div>
  </div>

  <!-- 统计 -->
  <div class="stats">
    <div class="stat-item">
      <div class="stat-value" id="totalAlarms">0</div>
      <div class="stat-label">闹钟总数</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="nextAlarm">--</div>
      <div class="stat-label">下次提醒</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="totalSets">0</div>
      <div class="stat-label">已设置轮次</div>
    </div>
  </div>

  <button class="btn btn-danger" style="margin-top: 12px;" onclick="clearAllAlarms()">
    🗑️ 清空所有闹钟
  </button>

  <script src="popup.js"></script>
</body>
</html>
